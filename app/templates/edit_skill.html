<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Skill</title>

<style>

body{
margin:0;
font-family:Arial;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar a{
text-decoration:none;
color:white;
}

.sidebar p{
padding:10px;
border-radius:5px;
}

.sidebar p:hover{
background:#334155;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
background:#f5f7fa;
}

.section{
background:white;
padding:20px;
border-radius:8px;
width:400px;
}

input,select{
padding:10px;
width:100%;
margin-bottom:15px;
}

button{
padding:10px 18px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Skill Tracker</h2>

<a href="{{ url_for('main.admin_dashboard') }}">
<p>Dashboard</p>
</a>

<a href="/admin/manage-category">
<p>Manage Categories</p>
</a>

<a href="/admin/manage-skill">
<p>Manage Skills</p>
</a>

<a href="{{ url_for('auth.logout') }}">
<p>Logout</p>
</a>

</div>

<div class="content">

<div class="section">

<h2>Edit Skill</h2>

<form method="POST">

<select name="category_id">

{% for category in categories %}

<option 
value="{{category.id}}"
{% if category.id == skill.category_id %}
selected
{% endif %}
>

{{category.name}}

</option>

{% endfor %}

</select>

<input
type="text"
name="skill_name"
value="{{ skill.skill_name }}"
required>

<input
type="number"
name="weight"
value="{{ skill.weight }}">

<button type="submit">
Update Skill
</button>

</form>

</div>

</div>

</div>

</body>
</html>
