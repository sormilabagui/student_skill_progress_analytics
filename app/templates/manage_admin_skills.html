<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Skills</title>

<style>

body{
margin:0;
font-family:Arial;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar a{
text-decoration:none;
color:white;
}

.sidebar p{
padding:10px;
border-radius:5px;
}

.sidebar p:hover{
background:#334155;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
background:#f5f7fa;
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:#dc2626;
color:white;
}

.edit-btn{
background:#f59e0b;
color:white;
}

input,select{
padding:8px;
width:250px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Skill Tracker</h2>

<a href="{{ url_for('main.admin_dashboard') }}">
<p>Dashboard</p>
</a>

<a href="/admin/manage-category">
<p>Manage Categories</p>
</a>

<a href="/admin/manage-skill">
<p>Manage Skills</p>
</a>
<a href="/admin/users">
<p>User Management</p>
</a>
<a href="/admin/profile">
<p>Admin Profile</p>
</a>
<a href="{{ url_for('auth.logout') }}">
<p>Logout</p>
</a>

</div>

<div class="content">

<div class="section">

<h2>Add Skill</h2>

<form method="POST">

<select name="category_id">

{% for category in categories %}

<option value="{{category.id}}">
{{category.name}}
</option>
{% endfor %}

</select>

<br>

<input type="text"
name="skill_name"
placeholder="Skill Name"
required>

<br>

<input type="number"
name="weight"
placeholder="Weight">

<br>

<button class="add-btn" type="submit">
Add Skill
</button>

</form>

</div>

<div class="section">

<h2>All Skills</h2>

<table>

<tr>
<th>ID</th>
<th>Skill</th>
<th>Category</th>
<th>Weight</th>
<th>Actions</th>
</tr>

{% for s in skills %}

<tr>
<td>{{ s.id }}</td>
<td>{{ s.skill_name }}</td>
<td>{{ s.category.name }}</td>
<td>{{ s.weight }}</td>

<td>

<a href="/admin/edit-skill/{{s.id}}">
<button class="edit-btn">Edit</button>
</a>

<a href="/admin/delete-skill/{{s.id}}">
<button class="delete-btn">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</div>

</body>

</html>
