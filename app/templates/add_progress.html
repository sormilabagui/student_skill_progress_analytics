<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Add Study Progress</h2>

    <form method="POST">

        <select name="skill_id">

            {% for us in user_skills %}
            <option value="{{ us.skill.id }}">
                {{ us.skill.skill_name }}
            </option>
            {% endfor %}

        </select>

        <br><br>

        <input type="number" name="hours" placeholder="Hours Studied" required>

        <br><br>

        <button type="submit">Add Progress</button>

    </form>
</body>
</html>
