<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users</title>

<style>

body{
margin:0;
font-family:Arial;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar a{
text-decoration:none;
color:white;
}

.sidebar p{
padding:10px;
border-radius:5px;
}

.sidebar p:hover{
background:#334155;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
background:#f5f7fa;
}

.section{
background:white;
padding:20px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

.view-btn{
background:#2563eb;
color:white;
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Skill Tracker</h2>

<a href="{{ url_for('main.admin_dashboard') }}">
<p>Dashboard</p>
</a>

<a href="/admin/manage-category">
<p>Manage Categories</p>
</a>

<a href="/admin/manage-skill">
<p>Manage Skills</p>
</a>
<a href="{{ url_for('main.admin_resources') }}">
<p>Study Resources</p>
</a>
<a href="/admin/users">
<p>User Management</p>
</a>
<a href="/admin/profile">
<p>Admin Profile</p>
</a>
<a href="{{ url_for('auth.logout') }}">
<p>Logout</p>
</a>

</div>

<div class="content">

<div class="section">

<h2>All Users</h2>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>View</th>
</tr>

{% for u in users %}

<tr>

<td>{{ u.id }}</td>
<td>{{ u.name }}</td>
<td>{{ u.email }}</td>

<td>

<a href="/admin/user/{{u.id}}">
<button class="view-btn">
View
</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</div>

</body>
</html>
