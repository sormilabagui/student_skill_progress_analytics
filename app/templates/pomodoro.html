<!DOCTYPE html>

<html>
<head>

<title>Pomodoro Timer</title>

<style>

body{
margin:0;
font-family:Arial;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar a{
text-decoration:none;
color:white;
}

.sidebar p{
padding:10px;
border-radius:5px;
}

.sidebar p:hover{
background:#334155;
cursor:pointer;
}

.content{
flex:1;
padding:20px;
background:#f5f7fa;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
width:50%;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.timer-box{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.timer{
font-size:50px;
margin:20px 0;
}

.buttons button{
padding:10px 20px;
margin:5px;
cursor:pointer;
border:none;
border-radius:5px;
background:#1e293b;
color:white;
}

select{
padding:10px;
margin-top:10px;
}

.focus-mode .sidebar{
display:none;
}

.focus-mode .main{
width:100%;
text-align:center;
}

.focus-mode #timer{
font-size:80px;
margin-top:40px;
}

#focusModeBtn,
#exitFocusBtn{

padding:10px 18px;
margin:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}
.focus-stats{

margin:20px 0;
text-align:center;

}

#motivationText{

margin-top:10px;
font-style:italic;
color:#555;

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Skill Tracker</h2>

<a href="{{ url_for('main.user_dashboard') }}">
<p>🏠 Dashboard</p>
</a>

<a href="{{ url_for('main.manage_skills') }}">
<p>🧠 My Skills</p>
</a>

<a href="{{ url_for('main.goals_progress') }}">
<p>🎯 Goals & Progress</p>
</a>

<a href="{{ url_for('main.analytics') }}">
<p>📊 Analytics</p>
</a>

<a href="{{ url_for('main.productivity') }}">
<p>⏱ Productivity</p>
</a>

<a href="{{ url_for('main.pomodoro') }}">
<p>🍅 Pomodoro</p>
</a>

<a href="{{ url_for('main.reports') }}">
<p>📄 Reports</p>
</a>

<a href="{{ url_for('auth.logout') }}">
<p>🚪 Logout</p>
</a>

</div>

<div class="content">

<h2>🍅 Focus Timer</h2>

<div class="cards">

<div class="card">

<h3>Today's Sessions</h3>
<h2 id="todaySessions">0</h2>

</div>

<div class="card">

<h3>Today's Focus Hours</h3>
<h2 id="todayHours">0 hrs</h2>

</div>

</div>

<div class="timer-box">

<p id="motivationText">
Stay focused. You're building your future.
</p>

<br>

<label>Select Skill</label>

<br>

<select id="skillSelect">

{% for us in user_skills %}

<option value="{{ us.skill_id }}">
{{ us.skill.skill_name }}
</option>

{% endfor %}

</select>

<div class="timer">

<h1 id="timer">25:00</h1>

</div>

<button id="focusModeBtn">Enter Focus Mode</button>

<br><br>

<button id="exitFocusBtn" style="display:none;">
Exit Focus Mode
</button>

<div class="buttons">

<button id="start">Start</button> <button id="pause">Pause</button> <button id="stop">Stop & Save</button>

</div>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/pomodoro.js') }}"></script>

</body>
</html>
