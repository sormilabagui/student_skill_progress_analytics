<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Resources</title>

<style>

body{
margin:0;
font-family:Arial;
}

.container{
display:flex;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar a{
text-decoration:none;
color:white;
}

.sidebar p{
padding:10px;
border-radius:5px;
}

.sidebar p:hover{
background:#334155;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
background:#f5f7fa;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
width:220px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}
.primary-btn{
padding:12px 25px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Skill Tracker</h2>

<a href="{{ url_for('main.admin_dashboard') }}">
<p>Dashboard</p>
</a>

<a href="/admin/manage-category">
<p>Manage Categories</p>
</a>

<a href="/admin/manage-skill">
<p>Manage Skills</p>
</a>

<a href="{{ url_for('main.admin_resources') }}">
<p>Study Resources</p>
</a>

<a href="/admin/users">
<p>User Management</p>
</a>
<a href="/admin/profile">
<p>Admin Profile</p>
</a>
<a href="{{ url_for('auth.logout') }}">
<p>Logout</p>
</a>

</div>

<div class="content">

<h2>Add Study Resource</h2>

<form method="POST">

<select name="skill_id">

{% for skill in skills %}

<option value="{{ skill.id }}">
{{ skill.skill_name }}
</option>

{% endfor %}

</select>

<br><br>

<input 
type="text"
name="title"
placeholder="Resource Title"
required
>

<br><br>

<input 
type="text"
name="url"
placeholder="Resource URL"
required
>

<br><br>

<input 
type="text"
name="platform"
placeholder="Platform (Youtube / Website)"
>

<br><br>

<button class="primary-btn">
Add Resource
</button>

</form>


<h2>Existing Resources</h2>

<table class="skill-table">

<tr>
<th>Skill</th>
<th>Title</th>
<th>Platform</th>
</tr>

{% for r in resources %}

<tr>

<td>{{ r.skill.skill_name }}</td>
<td>{{ r.title }}</td>
<td>{{ r.platform }}</td>

</tr>

{% endfor %}

</table>

</div>


</div>

</body>
</html>
